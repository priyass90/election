<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ house }} House Election</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<style>

body{

background:url("/static/election.png");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

font-family:Arial, Helvetica, sans-serif;

margin:0;

}

.overlay{

background:rgba(0,0,0,0.65);

min-height:100vh;

padding:30px;

}

h1{

color:white;

text-align:center;

font-size:50px;

margin-bottom:20px;

}

.section{

background:white;

border-radius:20px;

padding:25px;

width:90%;

margin:25px auto;

box-shadow:0 0 20px rgba(0,0,0,.4);

}

.section h2{

background:#0d6efd;

color:white;

padding:15px;

text-align:center;

border-radius:12px;

font-size:34px;

margin-top:0;

}

label{

display:block;

padding:20px;

margin:15px 0;

border:3px solid #d6d6d6;

border-radius:15px;

font-size:30px;

font-weight:bold;

background:white;

color:black;

cursor:pointer;

transition:0.3s;

}

label:hover{

background:#fff5bf;

border-color:#f5b400;

transform:scale(1.02);

}

input[type="radio"]{

transform:scale(2);

margin-right:20px;

accent-color:#198754;

}

input[type="radio"]:checked + span{

color:#198754;

font-weight:bold;

}

.submit{

display:block;

margin:40px auto;

width:420px;

height:90px;

border:none;

border-radius:18px;

background:#198754;

color:white;

font-size:32px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

.submit:hover{

background:#157347;

transform:scale(1.05);

}

.back{

display:inline-block;

margin-top:15px;

padding:15px 30px;

background:#dc3545;

color:white;

text-decoration:none;

border-radius:12px;

font-size:22px;

}

.back:hover{

background:#bb2d3b;

}

</style>

</head>

<body>

<div class="overlay">

<h1>

🏫 {{ house }} House Election

</h1>

<form action="/submit"
method="post"
onsubmit="return confirm('Are you sure you want to submit your vote?');">

<input type="hidden"
name="house"
value="{{ house }}">

<div class="section">

<h2>

🏆 HOUSE CAPTAIN

</h2>

{% for c in captains %}

<label>

<input type="radio"
name="captain"
value="{{ c }}"
required>

<span>{{ c }}</span>

</label>

{% endfor %}

</div>

<div class="section">

<h2>

🌟 HOUSE VICE CAPTAIN

</h2>

{% for v in vice %}

<label>

<input type="radio"
name="vice"
value="{{ v }}"
required>

<span>{{ v }}</span>

</label>

{% endfor %}

</div>

<button class="submit">

🗳 CAST MY VOTE

</button>

<center>

<a href="/"
class="back">

⬅ Back

</a>

</center>

</form>

</div>

</body>

</html>
