<!DOCTYPE html>

<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<style>

body{

background:url("/static/election.png");

background-size:cover;

font-family:Arial;

}

.overlay{

background:rgba(0,0,0,.75);

min-height:100vh;

padding:40px;

}

.box{

background:white;

width:900px;

margin:auto;

border-radius:25px;

padding:40px;

text-align:center;

}

h1{

font-size:50px;

color:#0d6efd;

}

.total{

font-size:40px;

margin:30px;

color:red;

}

table{

width:100%;

font-size:28px;

border-collapse:collapse;

margin-top:30px;

}

th{

background:#0d6efd;

color:white;

padding:15px;

}

td{

padding:15px;

border:1px solid #ddd;

}

.btn{

display:inline-block;

margin:20px;

padding:18px 40px;

font-size:24px;

border-radius:15px;

text-decoration:none;

background:#198754;

color:white;

}

.btn:hover{

background:#157347;

}

.blue{

background:#0d6efd;

}

.blue:hover{

background:#084298;

}

</style>

</head>

<body>

<div class="overlay">

<div class="box">

<h1>

Teacher Dashboard

</h1>

<div class="total">

Total Votes

<br><br>

{{total}}

</div>

<table>

<tr>

<th>House</th>

<th>Votes</th>

</tr>

{% for house,votes in houses.items() %}

<tr>

<td>{{house}}</td>

<td>{{votes}}</td>

</tr>

{% endfor %}

</table>

<br>

<a class="btn blue"

href="/results">

📊 View Results

</a>

<a class="btn"

href="/download">

📥 Download Excel

</a>

</div>

</div>

</body>

</html>
